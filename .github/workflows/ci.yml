name: Build and Deploy

on:
  # タグプッシュによる自動トリガー（例: v1.21.4-0.6.14）
  push:
    tags:
      - 'v*'
  # GitHub Actions の手動トリガー
  workflow_dispatch:
    inputs:
      deploy_targets:
        description: 'Deployment targets (comma-separated, e.g. sb-dev)'
        required: true
        default: 'sb-dev'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Extract versions from Gradle
        id: gradle_versions
        run: |
          MC_VERSION=$(./gradlew -q printMcVersion)
          PLUGIN_VERSION=$(./gradlew -q printPluginVersion)
          FULL_VERSION="${MC_VERSION}-${PLUGIN_VERSION}"
          echo "MC_VERSION=${MC_VERSION}" >> $GITHUB_ENV
          echo "PLUGIN_VERSION=${PLUGIN_VERSION}" >> $GITHUB_ENV
          echo "FULL_VERSION=${FULL_VERSION}" >> $GITHUB_ENV

      - name: Build plugin
        run: ./gradlew build

      - name: List build artifacts
        run: ls -la build/libs

      # workflow_dispatch での手動トリガーの場合、入力値を使用
      - name: Set deploy targets for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "TARGETS=${{ github.event.inputs.deploy_targets }}" >> $GITHUB_ENV

      # タグプッシュの場合は、当面 sb-dev にデプロイ
      - name: Set deploy targets for tag push
        if: github.event_name == 'push'
        run: echo "TARGETS=sb-dev" >> $GITHUB_ENV

      # sb-devへのデプロイ（アップロードのみ。Minecraft サーバー再起動は手動）
      - name: Deploy to sb-dev
        if: contains(env.TARGETS, 'sb-dev')
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          JAR_PATH="build/libs/mc-remote-${MC_VERSION}-${PLUGIN_VERSION}.jar"
          lftp <<EOF
          set cmd:fail-exit yes
          open ftp://${FTP_HOST}
          user ${FTP_USER} ${FTP_PASS}
          cd ${FTP_PATH}
          glob -a rm mc-remote*.jar
          put ${JAR_PATH}
          bye
          EOF
          echo "Deployed to sb-dev environment. Restart the Minecraft server manually."

      # タグプッシュ（自動リリースの場合）のときのみリリース作成、アーティファクト添付
      - name: Create GitHub Release with artifact
        if: github.event_name == 'push'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # action-gh-release@v2 reads the token from the `token` input (default:
          # the restricted built-in github.token), so the PAT must be passed here,
          # not via env.GITHUB_TOKEN, or release creation fails with HTTP 403.
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Automatically generated release for version ${{ github.ref_name }}."
          draft: false
          prerelease: false
          files: build/libs/mc-remote-${{ env.MC_VERSION }}-${{ env.PLUGIN_VERSION }}.jar
